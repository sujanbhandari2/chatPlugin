name: health_chat_mobile
description: Healthcare multi-tenant chat mobile client.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  dio: ^5.9.0
  socket_io_client: ^3.1.2
  shared_preferences: ^2.5.3
  image_picker: ^1.2.0
  file_picker: ^10.3.3
  record: ^6.1.2
  path_provider: ^2.1.5
  intl: ^0.20.2
  audioplayers: ^6.5.1
  firebase_core: ^4.4.0
  firebase_messaging: ^16.0.1
  flutter_local_notifications: ^17.2.3
  health_messenger_ui:
    path: ../packages/health_messenger_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
